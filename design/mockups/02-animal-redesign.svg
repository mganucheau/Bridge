<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 740" width="960" height="740" font-family="Inter, system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <title>Bridge — Drums (redesign v2)</title>

  <defs>
    <linearGradient id="appBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A1420"/>
      <stop offset="1" stop-color="#110D15"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#231A23"/>
      <stop offset="1" stop-color="#1B141B"/>
    </linearGradient>
    <radialGradient id="knobFace" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#2A222A"/>
      <stop offset="1" stop-color="#15101A"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <symbol id="knob" viewBox="0 0 72 72" overflow="visible">
      <circle cx="36" cy="36" r="30" fill="none" stroke="#2E2530" stroke-width="5"/>
      <path d="M 14.75 54.25 A 30 30 0 1 1 57.25 54.25" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
      <circle cx="36" cy="36" r="23" fill="url(#knobFace)" stroke="#3A2F3A"/>
      <line x1="36" y1="36" x2="36" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="36" cy="36" r="2" fill="currentColor"/>
    </symbol>
  </defs>

  <rect width="960" height="740" fill="url(#appBg)"/>

  <!-- ═══ TAB STRIP (power dots removed) ═══ -->
  <g>
    <rect width="960" height="52" fill="#14111A"/>
    <line x1="0" y1="51.5" x2="960" y2="51.5" stroke="#2E2530"/>
    <g font-size="12" font-weight="700" letter-spacing="2" text-anchor="middle">
      <g transform="translate(12,8)">
        <rect width="168" height="36" rx="10" fill="#1A171F" stroke="#2E2530"/>
        <text x="84" y="23" fill="#9E99A8">LEADER</text>
      </g>
      <g transform="translate(196,8)">
        <rect width="168" height="36" rx="10" fill="#23181C" stroke="#E07A5A" stroke-opacity="0.85"/>
        <rect y="33" width="168" height="3" rx="1.5" fill="#E07A5A"/>
        <text x="84" y="23" fill="#F4E3D7">DRUMS</text>
      </g>
      <g transform="translate(380,8)">
        <rect width="168" height="36" rx="10" fill="#1A171F" stroke="#2E2530"/>
        <text x="84" y="23" fill="#9E99A8">BASS</text>
      </g>
      <g transform="translate(564,8)">
        <rect width="168" height="36" rx="10" fill="#1A171F" stroke="#2E2530"/>
        <text x="84" y="23" fill="#9E99A8">KEYS</text>
      </g>
      <g transform="translate(748,8)">
        <rect width="168" height="36" rx="10" fill="#1A171F" stroke="#2E2530"/>
        <text x="84" y="23" fill="#9E99A8">GUITAR</text>
      </g>
    </g>
  </g>

  <!-- ═══ PAGE TITLE ROW (top-padded; on/off toggle left of title) ═══ -->
  <g transform="translate(24,76)">
    <g>
      <rect width="44" height="22" rx="11" fill="#1F3A26" stroke="#4CAF50" stroke-opacity="0.6"/>
      <circle cx="33" cy="11" r="8" fill="#4CAF50"/>
    </g>
    <rect x="60" y="-3" width="4" height="28" fill="#E07A5A"/>
    <text x="72" y="19" fill="#F4E3D7" font-size="22" font-weight="700" letter-spacing="3">DRUMS</text>
  </g>

  <!-- ═══ DROPDOWN ROW: Root / Scale / Oct + subtitle, all vertically centred ═══ -->
  <g transform="translate(24,112)">
    <g font-size="12" fill="#B0A8C4">
      <g transform="translate(0,0)">
        <text x="0" y="16" fill="#9E99A8">Root</text>
        <rect x="40" y="2" width="60" height="22" rx="6" fill="#14111A" stroke="#3A2F3A"/>
        <text x="50" y="17" fill="#F4E3D7">C</text>
        <path d="M 90 12 l 4 5 l 4 -5 z" fill="#9E99A8"/>
      </g>
      <g transform="translate(116,0)">
        <text x="0" y="16" fill="#9E99A8">Scale</text>
        <rect x="46" y="2" width="108" height="22" rx="6" fill="#14111A" stroke="#3A2F3A"/>
        <text x="56" y="17" fill="#F4E3D7">Minor</text>
        <path d="M 144 12 l 4 5 l 4 -5 z" fill="#9E99A8"/>
      </g>
      <g transform="translate(284,0)">
        <text x="0" y="16" fill="#9E99A8">Oct</text>
        <rect x="36" y="2" width="52" height="22" rx="6" fill="#14111A" stroke="#3A2F3A"/>
        <text x="46" y="17" fill="#F4E3D7">2</text>
        <path d="M 78 12 l 4 5 l 4 -5 z" fill="#9E99A8"/>
      </g>
    </g>

    <!-- subtitle merged into this row, centred to the dropdown baseline -->
    <text x="912" y="19" text-anchor="end" fill="#6A6578" font-size="11" letter-spacing="1.6">8 LANES · 16 STEPS · GROOVE &amp; FILLS</text>
  </g>

  <!-- ═══ GRID CARD (padded above & below to match Bootsy) ═══ -->
  <g transform="translate(24,150)" filter="url(#softShadow)">
    <rect width="912" height="306" rx="14" fill="url(#cardBg)" stroke="#2E2530"/>

    <!-- inner grid area, with Bootsy-style vertical padding (12 above/below) -->
    <g transform="translate(16,12)">
      <!-- step header 1..16 -->
      <g font-size="9" fill="#6A6578" text-anchor="middle">
        <text x="160" y="12">1</text><text x="200" y="12">2</text><text x="240" y="12">3</text><text x="280" y="12">4</text>
        <text x="320" y="12">5</text><text x="360" y="12">6</text><text x="400" y="12">7</text><text x="440" y="12">8</text>
        <text x="480" y="12">9</text><text x="520" y="12">10</text><text x="560" y="12">11</text><text x="600" y="12">12</text>
        <text x="640" y="12">13</text><text x="680" y="12">14</text><text x="720" y="12">15</text><text x="760" y="12">16</text>
      </g>
      <text x="78" y="12" fill="#9E99A8" font-size="10" text-anchor="middle" font-weight="600">Key notes</text>

      <!-- piano sidebar (one row per lane) + M/S column. Kick is AT THE BOTTOM. -->
      <!-- lanes top→bottom: Hat, OH, Ride, Tom, Clap, Snare, Perc, Kick -->
      <g transform="translate(0,24)">
        <g font-size="8" fill="#9E99A8">
          <!-- row 1: Hat -->
          <rect x="0"   y="0"  width="56" height="32" fill="#1A151D" stroke="#2E2530"/>
          <text x="52" y="20" text-anchor="end">Hat F#4</text>
          <rect x="58"  y="0"  width="52" height="32" rx="4" fill="#14111A" stroke="#2E2530"/>
          <text x="84" y="14" text-anchor="middle" fill="#6A6578">M</text><text x="84" y="26" text-anchor="middle" fill="#6A6578">S</text>

          <rect x="0"   y="34" width="56" height="32" fill="#231A23" stroke="#2E2530"/>
          <text x="52" y="54" text-anchor="end">OH A#4</text>
          <rect x="58"  y="34" width="52" height="32" rx="4" fill="#14111A" stroke="#2E2530"/>
          <text x="84" y="48" text-anchor="middle" fill="#6A6578">M</text><text x="84" y="60" text-anchor="middle" fill="#6A6578">S</text>

          <rect x="0"   y="68" width="56" height="32" fill="#1A151D" stroke="#2E2530"/>
          <text x="52" y="88" text-anchor="end">Ride D#5</text>
          <rect x="58"  y="68" width="52" height="32" rx="4" fill="#14111A" stroke="#2E2530"/>
          <text x="84" y="82" text-anchor="middle" fill="#6A6578">M</text><text x="84" y="94" text-anchor="middle" fill="#6A6578">S</text>

          <rect x="0"   y="102" width="56" height="32" fill="#231A23" stroke="#2E2530"/>
          <text x="52" y="122" text-anchor="end">Tom A3</text>
          <rect x="58"  y="102" width="52" height="32" rx="4" fill="#14111A" stroke="#2E2530"/>
          <text x="84" y="116" text-anchor="middle" fill="#6A6578">M</text><text x="84" y="128" text-anchor="middle" fill="#6A6578">S</text>

          <rect x="0"   y="136" width="56" height="32" fill="#1A151D" stroke="#2E2530"/>
          <text x="52" y="156" text-anchor="end">Clap D#4</text>
          <rect x="58"  y="136" width="52" height="32" rx="4" fill="#14111A" stroke="#2E2530"/>
          <text x="84" y="150" text-anchor="middle" fill="#6A6578">M</text><text x="84" y="162" text-anchor="middle" fill="#6A6578">S</text>

          <rect x="0"   y="170" width="56" height="32" fill="#231A23" stroke="#2E2530"/>
          <text x="52" y="190" text-anchor="end">Snare D4</text>
          <rect x="58"  y="170" width="52" height="32" rx="4" fill="#14111A" stroke="#2E2530"/>
          <text x="84" y="184" text-anchor="middle" fill="#6A6578">M</text><text x="84" y="196" text-anchor="middle" fill="#6A6578">S</text>

          <rect x="0"   y="204" width="56" height="32" fill="#1A151D" stroke="#2E2530"/>
          <text x="52" y="224" text-anchor="end">Perc A#3</text>
          <rect x="58"  y="204" width="52" height="32" rx="4" fill="#14111A" stroke="#2E2530"/>
          <text x="84" y="218" text-anchor="middle" fill="#6A6578">M</text><text x="84" y="230" text-anchor="middle" fill="#6A6578">S</text>

          <!-- KICK AT THE BOTTOM -->
          <rect x="0"   y="238" width="56" height="32" fill="#231A23" stroke="#2E2530"/>
          <text x="52" y="258" text-anchor="end" fill="#F4E3D7" font-weight="700">Kick C2</text>
          <rect x="58"  y="238" width="52" height="32" rx="4" fill="#14111A" stroke="#2E2530"/>
          <text x="84" y="252" text-anchor="middle" fill="#6A6578">M</text><text x="84" y="264" text-anchor="middle" fill="#6A6578">S</text>
        </g>

        <!-- grid cells 8 lanes × 16 steps, kick at bottom -->
        <g>
          <!-- background cells with beat-line accents every 4 steps -->
          <g>
            <g stroke="#2E2530" stroke-width="0.6" fill="#181320">
              <!-- 8 rows × 16 cols = generated inline for clarity -->
              <rect x="140" y="0" width="640" height="270" fill="#181320"/>
            </g>
            <!-- faint grid lines -->
            <g stroke="#2E2530" stroke-width="0.5">
              <line x1="140" y1="34"  x2="780" y2="34"/>
              <line x1="140" y1="68"  x2="780" y2="68"/>
              <line x1="140" y1="102" x2="780" y2="102"/>
              <line x1="140" y1="136" x2="780" y2="136"/>
              <line x1="140" y1="170" x2="780" y2="170"/>
              <line x1="140" y1="204" x2="780" y2="204"/>
              <line x1="140" y1="238" x2="780" y2="238"/>
            </g>
            <g stroke="#3A2F3A" stroke-width="0.6">
              <line x1="300" y1="0" x2="300" y2="270"/>
              <line x1="460" y1="0" x2="460" y2="270"/>
              <line x1="620" y1="0" x2="620" y2="270"/>
            </g>
          </g>

          <!-- hits. lanes: 0 Hat, 1 OH, 2 Ride, 3 Tom, 4 Clap, 5 Snare, 6 Perc, 7 Kick -->
          <g fill="#E07A5A">
            <!-- Kick (row 7 — BOTTOM) on 1, 5, 9, 13 -->
            <g>
              <rect x="144" y="242" width="32" height="24" rx="3"/>
              <rect x="304" y="242" width="32" height="24" rx="3"/>
              <rect x="464" y="242" width="32" height="24" rx="3"/>
              <rect x="624" y="242" width="32" height="24" rx="3"/>
            </g>
            <!-- Snare (row 5) on 5, 13 -->
            <g>
              <rect x="304" y="174" width="32" height="24" rx="3" opacity="0.95"/>
              <rect x="624" y="174" width="32" height="24" rx="3" opacity="0.95"/>
            </g>
            <!-- Clap (row 4) on 5, 13 -->
            <g opacity="0.7">
              <rect x="304" y="140" width="32" height="24" rx="3"/>
              <rect x="624" y="140" width="32" height="24" rx="3"/>
            </g>
            <!-- Hat (row 0) every step -->
            <g opacity="0.55">
              <rect x="144" y="4"  width="32" height="24" rx="3"/>
              <rect x="184" y="4"  width="32" height="24" rx="3"/>
              <rect x="224" y="4"  width="32" height="24" rx="3"/>
              <rect x="264" y="4"  width="32" height="24" rx="3"/>
              <rect x="304" y="4"  width="32" height="24" rx="3"/>
              <rect x="344" y="4"  width="32" height="24" rx="3"/>
              <rect x="384" y="4"  width="32" height="24" rx="3"/>
              <rect x="424" y="4"  width="32" height="24" rx="3"/>
              <rect x="464" y="4"  width="32" height="24" rx="3"/>
              <rect x="504" y="4"  width="32" height="24" rx="3"/>
              <rect x="544" y="4"  width="32" height="24" rx="3"/>
              <rect x="584" y="4"  width="32" height="24" rx="3"/>
              <rect x="624" y="4"  width="32" height="24" rx="3"/>
              <rect x="664" y="4"  width="32" height="24" rx="3"/>
              <rect x="704" y="4"  width="32" height="24" rx="3"/>
              <rect x="744" y="4"  width="32" height="24" rx="3"/>
            </g>
            <!-- OH (row 1) on 3, 11 -->
            <g opacity="0.9">
              <rect x="224" y="38" width="32" height="24" rx="3"/>
              <rect x="544" y="38" width="32" height="24" rx="3"/>
            </g>
            <!-- Tom (row 3) on 15 -->
            <g opacity="0.75"><rect x="704" y="106" width="32" height="24" rx="3"/></g>
            <!-- Perc (row 6) ghost on 7, 15 -->
            <g opacity="0.55">
              <rect x="384" y="208" width="32" height="24" rx="3"/>
              <rect x="704" y="208" width="32" height="24" rx="3"/>
            </g>
          </g>

          <!-- IN-GRID LOOP BRACKET SELECTORS (replaces the old loop slider row) -->
          <g fill="none" stroke="#E07A5A" stroke-width="2.5" stroke-linecap="round">
            <!-- left bracket at step 1 -->
            <path d="M 142 0 L 138 0 L 138 270 L 142 270"/>
            <!-- right bracket at step 12 -->
            <path d="M 618 0 L 622 0 L 622 270 L 618 270"/>
          </g>
          <g font-size="8" fill="#E07A5A" letter-spacing="1">
            <text x="138" y="-4">START · 1</text>
            <text x="622" y="-4" text-anchor="end">END · 12</text>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- ═══ BOTTOM HALF — knob row + loop/style/actions card ═══ -->
  <g transform="translate(24,478)">
    <!-- 8 knobs: Density, Swing, Humanize, Pocket, Velocity, Fill Rate, Complexity, Ghost -->
    <g font-size="10" fill="#B0A8C4" text-anchor="middle" letter-spacing="0.8">
      <g transform="translate(0,0)"   color="#E07A5A"><use href="#knob" width="64" height="64" x="0" y="0"/><text x="32" y="76">DENSITY</text></g>
      <g transform="translate(66,0)"  color="#E07A5A"><use href="#knob" width="64" height="64" x="0" y="0"/><text x="32" y="76">SWING</text></g>
      <g transform="translate(132,0)" color="#E07A5A"><use href="#knob" width="64" height="64" x="0" y="0"/><text x="32" y="76">HUMANIZE</text></g>
      <g transform="translate(198,0)" color="#E07A5A"><use href="#knob" width="64" height="64" x="0" y="0"/><text x="32" y="76">POCKET</text></g>
      <g transform="translate(264,0)" color="#E07A5A"><use href="#knob" width="64" height="64" x="0" y="0"/><text x="32" y="76">VELOCITY</text></g>
      <g transform="translate(330,0)" color="#E07A5A"><use href="#knob" width="64" height="64" x="0" y="0"/><text x="32" y="76">FILL RATE</text></g>
      <g transform="translate(396,0)" color="#E07A5A"><use href="#knob" width="64" height="64" x="0" y="0"/><text x="32" y="76">COMPLEX</text></g>
      <g transform="translate(462,0)" color="#E07A5A"><use href="#knob" width="64" height="64" x="0" y="0"/><text x="32" y="76">GHOST</text></g>
    </g>

    <!-- Loop + Style + Actions card — identical structure everywhere -->
    <g transform="translate(548,0)" filter="url(#softShadow)">
      <rect width="364" height="108" rx="12" fill="url(#cardBg)" stroke="#2E2530"/>

      <g transform="translate(16,12)" font-size="9" fill="#9E99A8" letter-spacing="0.8">
        <text x="0" y="8">LOOP START</text>
        <rect x="0" y="12" width="86" height="18" rx="9" fill="#14111A" stroke="#3A2F3A"/>
        <line x1="6" y1="21" x2="80" y2="21" stroke="#2E2530"/>
        <line x1="6" y1="21" x2="10" y2="21" stroke="#E07A5A" stroke-width="2"/>
        <circle cx="10" cy="21" r="5" fill="#E07A5A"/>
        <g transform="translate(92,12)">
          <rect width="22" height="18" rx="6" fill="#1F1B25" stroke="#E07A5A" stroke-opacity="0.6"/>
          <text x="11" y="12" fill="#E07A5A" text-anchor="middle" font-size="10">L</text>
        </g>

        <text x="128" y="8">LOOP END</text>
        <rect x="128" y="12" width="86" height="18" rx="9" fill="#14111A" stroke="#3A2F3A"/>
        <line x1="134" y1="21" x2="208" y2="21" stroke="#2E2530"/>
        <line x1="134" y1="21" x2="190" y2="21" stroke="#E07A5A" stroke-width="2"/>
        <circle cx="190" cy="21" r="5" fill="#E07A5A"/>
        <g transform="translate(220,12)">
          <rect width="22" height="18" rx="6" fill="#1F1B25" stroke="#E07A5A" stroke-opacity="0.6"/>
          <text x="11" y="12" fill="#E07A5A" text-anchor="middle" font-size="10">L</text>
        </g>

        <text x="256" y="8">SPEED</text>
        <g transform="translate(256,12)" font-size="9" font-weight="600">
          <rect width="24" height="18" rx="5" fill="#14111A" stroke="#3A2F3A"/>
          <text x="12" y="12" fill="#9E99A8" text-anchor="middle">x2</text>
          <rect x="28" width="24" height="18" rx="5" fill="#E07A5A" fill-opacity="0.35" stroke="#E07A5A" stroke-opacity="0.5"/>
          <text x="40" y="12" fill="#F4E3D7" text-anchor="middle">1</text>
          <rect x="56" width="24" height="18" rx="5" fill="#14111A" stroke="#3A2F3A"/>
          <text x="68" y="12" fill="#9E99A8" text-anchor="middle">1/2</text>
        </g>
      </g>

      <g transform="translate(16,52)" font-size="10">
        <text fill="#9E99A8" y="4" letter-spacing="0.8">STYLE</text>
        <rect x="36" y="-6" width="312" height="22" rx="7" fill="#14111A" stroke="#3A2F3A"/>
        <text x="46" y="9" fill="#F4E3D7">Boom Bap</text>
        <path d="M 332 2 l 5 7 l 5 -7 z" fill="#9E99A8"/>
      </g>

      <g transform="translate(16,80)" font-size="10" font-weight="700" letter-spacing="1.2">
        <rect width="108" height="20" rx="6" fill="#E07A5A"/>
        <text x="54" y="14" fill="#1F0A00" text-anchor="middle">GEN</text>
        <rect x="120" width="108" height="20" rx="6" fill="#1F1B25" stroke="#3A2F3A"/>
        <text x="174" y="14" fill="#E07A5A" text-anchor="middle">FILL</text>
        <rect x="240" width="108" height="20" rx="6" fill="#1F1B25" stroke="#3A2F3A"/>
        <text x="294" y="14" fill="#E07A5A" text-anchor="middle">PERF</text>
      </g>
    </g>
  </g>

  <g transform="translate(24,722)" font-size="9" fill="#6A6578">
    <text>v2 · Kick at bottom · in-grid loop brackets · top-padded title + on/off toggle · subtitle merged onto dropdown row · shared bottom half (8 knobs + loop/style/actions)</text>
  </g>
</svg>
