  <g transform="translate(24,722)" font-size="9" fill="#5E6A85">
    <text>v2 · Fretboard dropped · piano sidebar + note grid like Bootsy/Stevie · in-grid loop brackets · top-padded title + on/off toggle · shared bottom half</text>
  </g>
</svg>
